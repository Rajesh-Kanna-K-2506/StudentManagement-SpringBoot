<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Add Student</title>
</head>

<body>

<h2>Add Student</h2>

<form action="/save" method="post">

Name:
<input type="text"
       name="name"
       required>

<br><br>

Department:
<input type="text"
       name="department"
       required>

<br><br>

Marks:
<input type="number"
       name="marks"
       required>

<br><br>

<button type="submit">
Save
</button>

</form>

<br>

<a href="/">Back</a>

</body>
</html>
