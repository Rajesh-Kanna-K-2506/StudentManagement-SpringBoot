<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Management System</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    Student Management System
</div>
<div class="container">
    <div class="card">
        <h2>Student Dashboard</h2>
        <div class="dashboard">
        <div class="stat-card">
        <h2 th:text="${students.size()}"></h2>
        <p>Total Students</p>
        </div>
        
        <div class="stat-card">
        <h2>CRUD</h2>
        <p>Operations Enabled</p>
        </div>
        
        <div class="stat-card">
        <h2>Spring</h2>
        <p>Boot MVC</p>
        </div>
    </div>
    <div style="margin-bottom:20px;">
    <form action="/search" method="get">
        <input type="text" name="keyword" placeholder="Search student by name..." style="width:70%;display:inline-block;">
        <button type="submit" class="btn btn-edit">Search</button>
        <a href="/" class="btn btn-add">Reset</a>
    </form>
    </div>
        <br>
        <a href="/add" class="btn btn-add">Add Student</a>
        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Department</th>
                <th>Marks</th>
                <th>Actions</th>
            </tr>
            <tr th:each="student : ${students}">
                <td th:text="${student.id}"></td>
                <td th:text="${student.name}"></td>
                <td th:text="${student.department}"></td>
                <td th:text="${student.marks}"></td>
                <td>
                    <a th:href="@{/edit/{id}(id=${student.id})}"
                       class="btn btn-edit">
                        Edit
                    </a>
                    <a th:href="@{/delete/{id}(id=${student.id})}"
                       class="btn btn-delete"
                       onclick="return confirm('Are you sure you want to delete this student?')">
                        Delete
                    </a>
                </td>
            </tr>
        </table>
    </div>
</div>
<footer class="footer">
    <p>
        Student Management System | Developed by Rajesh Kanna © 2026
    </p>
</footer>
</body>
</html>
